name: Train NNUE Weights

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 0'

permissions:
  contents: write

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Download opening book
        run: |
          mkdir -p public
          # Download a real Polyglot opening book (Performance.bin - 2.3MB, 600k+ positions)
          curl -sL "https://github.com/michaeldv/donna_opening_books/raw/master/books/performance.bin" \
            -o public/book.bin || \
          curl -sL "https://raw.githubusercontent.com/official-stockfish/books/master/performance.bin" \
            -o public/book.bin || \
          echo "Book download failed - will use built-in moves"
          ls -lh public/book.bin 2>/dev/null && echo "Book ready" || echo "No book file"

      - name: Download Lichess games for training
        run: |
          echo "Downloading grandmaster games..."
          curl -sL \
            "https://lichess.org/games/export/DrNykterstein?max=2000&evals=false&clocks=false&perfType=blitz,rapid,classical" \
            -H "Accept: application/x-chess-pgn" -o games.pgn
          curl -sL \
            "https://lichess.org/games/export/hikaru?max=1000&evals=false&clocks=false&perfType=blitz" \
            -H "Accept: application/x-chess-pgn" >> games.pgn
          curl -sL \
            "https://lichess.org/games/export/alireza2003?max=1000&evals=false&clocks=false&perfType=blitz" \
            -H "Accept: application/x-chess-pgn" >> games.pgn
          echo "Games: $(grep -c '^\[Event' games.pgn || echo 0)"

      - name: Run NNUE trainer
        run: node scripts/train-nnue.mjs games.pgn 10 public/weights.bin

      - name: Build project
        run: npm run build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: engine-assets
          path: |
            public/weights.bin
            public/book.bin
          retention-days: 90

      - name: Commit back to repo
        run: |
          git config --global user.name  "NNUE Trainer Bot"
          git config --global user.email "bot@mindmove.chess"
          git add public/weights.bin public/book.bin
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "🧠 Update NNUE weights + opening book [$(date '+%Y-%m-%d')]"
            git pull --rebase origin main
            git push origin main
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
